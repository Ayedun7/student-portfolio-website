  <body data-page="planner">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">Amina Okafor</a>

    <main class="container page planner-page">
      <section class="card planner-card">
        <h1>Academic Planner</h1>
        <p>Organize assignments, study sessions, and deadlines in one place.</p>

        <form id="taskForm" class="task-form">
          <input id="taskInput" type="text" placeholder="Add a new task" required />
          <button type="submit" class="btn">Add Task</button>
        </form>

        <ul id="taskList" class="task-list"></ul>
      </section>
    </main>
